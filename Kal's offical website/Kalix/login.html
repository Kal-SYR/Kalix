<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KALIX — Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="bg"></div>
  <div class="grid"></div>
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <nav>
    <a href="index.html" class="logo">KALIX</a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="market.html">Market</a></li>
    </ul>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card">

      <h1 class="auth-title">Secure Access</h1>
      <p class="auth-sub" id="authSub">Sign in to enter the KALIX trading network.</p>

      <!-- status / error line -->
      <div class="auth-msg" id="authMsg" role="alert"></div>

      <form id="authForm" novalidate>

        <!-- name field (only shown on sign-up) -->
        <div class="field" id="nameField" hidden>
          <label for="name">Display name</label>
          <input type="text" id="name" autocomplete="name" placeholder="e.g. Khalid" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="you@kalix.io" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn primary" id="submitBtn">Sign in</button>
      </form>

      <button type="button" class="link-btn" id="forgotBtn">Forgot password?</button>

      <div class="divider"><span>or</span></div>

      <button type="button" class="btn google" id="googleBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.9 1.5l2.6-2.5C16.9 3.4 14.7 2.4 12 2.4 6.9 2.4 2.8 6.5 2.8 11.6S6.9 20.8 12 20.8c5.9 0 9.8-4.1 9.8-9.9 0-.7-.1-1.2-.2-1.7H12z"/>
        </svg>
        Continue with Google
      </button>

      <p class="switch">
        <span id="switchText">Don't have an account?</span>
        <button type="button" class="link-btn inline" id="switchBtn">Create one</button>
      </p>

    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
